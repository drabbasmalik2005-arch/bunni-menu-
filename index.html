                        const itemImg = item.image || cat.defaultImage;
                        html += `
                            <div class="min-w-[220px] w-[220px] bg-white dark:bg-bunni-darkCard rounded-3xl p-3 shadow-sm border border-bunni-surface snap-center relative">
                                <div class="h-32 w-full rounded-2xl overflow-hidden mb-3 bg-bunni-surface pointer-events-none select-none">
                                    <img src="${itemImg}" alt="" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=600&q=80'">
                                </div>
                                <h3 class="font-bold text-base line-clamp-1">${item.name}</h3>
                                <div class="flex items-center justify-between mt-2">
                                    <span class="font-black text-bunni-gold">${item.price}</span>
                                    <div class="w-8 h-8 rounded-full bg-bunni-bg flex items-center justify-center"><i class="fa-solid fa-plus text-xs"></i></div>
                                </div>
                            </div>`;
                    }
                });
            });
            if(hasBestsellers) { scroll.innerHTML = html; container.classList.remove('hidden'); }
        }

        function renderNav() {
            const tabsContainer = document.getElementById('categoryTabs');
            if(!tabsContainer) return;
            let tabsHTML = '';
            menuData.forEach((cat, index) => {
                if(cat.id === 'add_ons') return;
                const isActive = index === 0 ? 'active' : '';
                tabsHTML += `<li><button onclick="scrollToSection('${cat.id}')" class="nav-pill ${isActive} flex items-center gap-2 px-4 py-2 rounded-full border border-bunni-gold/30 bg-white text-sm font-bold shadow-sm" data-target="${cat.id}"><div class="nav-icon-box w-7 h-7 rounded-full bg-bunni-surface flex items-center justify-center text-bunni-gold"><i class="${cat.icon} text-[12px]"></i></div><span class="ml-1">${cat.title}</span></button></li>`;
            });
            tabsContainer.innerHTML = tabsHTML;
        }

        function scrollToSection(id) {
            const targetSection = document.getElementById(`section-${id}`);
            if (targetSection) {
                const offsetPosition = targetSection.getBoundingClientRect().top + window.pageYOffset - 140;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
        }

        function renderMenu(data) {
            const container = document.getElementById('menuContainer');
            if(!container) return;
            let html = '';
            data.forEach((category) => {
                if(category.id === 'study_room' || category.id === 'add_ons') return;
                html += `<section id="section-${category.id}" class="menu-category w-full"><div class="flex items-center mb-5"><h2 class="text-2xl font-display font-black">${category.title}</h2><div class="flex-grow border-b border-dashed border-bunni-gold/30 mr-4"></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                category.items.forEach(item => {
                    const itemImg = item.image || category.defaultImage;
                    html += `
                        <div class="bg-white dark:bg-bunni-darkCard rounded-[20px] p-2.5 shadow-sm border border-bunni-surface flex items-center gap-3">
                            <div class="flex-1 py-1 pr-1">
                                <h3 class="font-bold text-[14px] leading-tight">${item.name}</h3>
                                <div class="flex items-center gap-2 mt-2"><span class="font-black text-bunni-gold text-sm">${item.price}</span></div>
                            </div>
                            <div class="w-24 h-24 shrink-0 rounded-[16px] overflow-hidden bg-bunni-surface relative shadow-inner">
                                <img src="${itemImg}" alt="" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=600&q=80'">
                            </div>
                        </div>`;
                });
                html += `</div></section>`;
            });
            container.innerHTML = html;
        }

        function setupScrollSpy() {
            const sections = document.querySelectorAll('.menu-category');
            const navLinks = document.querySelectorAll('.nav-pill');
            const navContainer = document.getElementById('categoryTabs');
            if(!sections.length || !navLinks.length || !navContainer) return;
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        navLinks.forEach(link => link.classList.remove('active'));
                        const activeId = entry.target.getAttribute('id').replace('section-', '');
                        const activeLink = document.querySelector(`.nav-pill[data-target="${activeId}"]`);
                        if (activeLink) {
                            activeLink.classList.add('active');
                            navContainer.scrollTo({ left: activeLink.offsetLeft - (navContainer.offsetWidth / 2) + (activeLink.offsetWidth / 2), behavior: 'smooth' });
                        }
                    }
                });
            }, { rootMargin: '-150px 0px -70% 0px' });
            sections.forEach(sec => observer.observe(sec));
        }

        window.onload = () => {
            renderBestsellers();
            renderNav();
            renderMenu(menuData);
            setTimeout(setupScrollSpy, 300);
        };
    </script>
</body>
</html>
